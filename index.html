<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #ffffff;
    }

    .container {
      text-align: center;
      animation: pulse 2.5s ease-in-out infinite;
    }

    h1 {
      font-family: sans-serif;
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 900;
      color: #0a0a0a;
      margin: 0;
    }

    h2 {
      font-family: sans-serif;
      font-size: clamp(1.5rem, 6vw, 5rem);
      font-weight: 700;
      color: #0a0a0a;
      margin: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World</h1>
    <h2>I'm MH</h2>
  </div>
</body>
</html>
