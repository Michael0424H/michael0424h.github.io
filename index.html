<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MH — Design Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --fg: #111111;
      --muted: #888;
      --accent: #111;
      --card-bg: #edecea;
      --border: #e0dedd;
      --radius: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      height: 60px;
      background: rgba(245,244,240,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
      text-decoration: none; color: var(--fg);
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      font-size: 0.9rem; color: var(--muted); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--fg); }

    /* PAGE */
    #app { padding-top: 60px; }
    .page { display: none; }
    .page.active { display: block; }

    /* HERO */
    .hero {
      padding: 8rem 2.5rem 6rem;
      max-width: 900px;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .hero p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      max-width: 540px;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      background: var(--fg);
      color: var(--bg);
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.75; }

    /* PROJECT GRID */
    .section { padding: 4rem 2.5rem; max-width: 1200px; margin: 0 auto; }
    .section-heading {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 520px), 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .project-card img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
    }
    .project-card-body { padding: 1.25rem 1.5rem 1.5rem; }
    .project-card-category {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .project-card-title {
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
    }

    /* PROJECT DETAIL */
    .project-detail { max-width: 860px; margin: 0 auto; padding: 4rem 2.5rem; }

    .project-hero-img {
      width: 100%; border-radius: var(--radius); overflow: hidden;
      margin-bottom: 3rem;
    }
    .project-hero-img img { width: 100%; display: block; }

    .project-meta {
      display: flex; gap: 2rem; margin-bottom: 0.75rem;
    }
    .project-meta span {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .project-detail h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800; letter-spacing: -0.03em;
      line-height: 1.1; margin-bottom: 3rem;
    }

    .module { margin-bottom: 4rem; }

    /* TEXT MODULE */
    .text-module .module-label {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
    }
    .text-module h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1rem;
    }
    .text-module p { color: #555; font-size: 1.05rem; max-width: 640px; }

    /* USE CASE MODULE */
    .use-case {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3rem; align-items: center;
      padding: 3rem; background: var(--card-bg);
      border-radius: var(--radius);
    }
    .use-case.image-left { direction: rtl; }
    .use-case.image-left > * { direction: ltr; }
    .use-case-content .module-label {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
    }
    .use-case-content h2 {
      font-size: 1.4rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 0.75rem;
    }
    .use-case-content p { color: #666; font-size: 0.95rem; line-height: 1.7; }
    .use-case img {
      width: 100%; border-radius: 8px; display: block;
    }

    /* ABOUT MODULE */
    .about-module {
      display: grid; grid-template-columns: 1fr 1.5fr;
      gap: 4rem; align-items: center;
    }
    .about-module img { width: 100%; border-radius: var(--radius); }
    .about-content h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1.5rem;
    }
    .about-content p { font-size: 1.1rem; color: #555; line-height: 1.8; }

    /* RICH TEXT */
    .rich-text p { margin-bottom: 0.75em; }
    .rich-text p:last-child { margin-bottom: 0; }
    .rich-text strong { font-weight: 700; }
    .rich-text em { font-style: italic; }
    .rich-text ul { list-style: disc; padding-left: 1.5em; margin: 0.5em 0; }
    .rich-text ol { list-style: decimal; padding-left: 1.5em; margin: 0.5em 0; }
    .rich-text li { margin-bottom: 0.25em; }
    .rich-text a { color: var(--fg); text-decoration: underline; }

    /* PROJECT PREV/NEXT NAV */
    .project-nav {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-top: 5rem; padding-top: 2rem;
      border-top: 1px solid var(--border);
      gap: 2rem;
    }
    .project-nav a {
      display: flex; flex-direction: column;
      font-size: 0.85rem; font-weight: 600;
      text-decoration: none; transition: color 0.2s;
      max-width: 45%;
    }
    .project-nav a:last-child { text-align: right; align-items: flex-end; }
    .project-nav a:hover .pn-title { color: var(--fg); }
    .project-nav .pn-dir { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.3rem; }
    .project-nav .pn-title { font-size: 0.95rem; font-weight: 700; color: #555; transition: color 0.2s; }

    /* BACK LINK */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.85rem; font-weight: 600; color: var(--muted);
      text-decoration: none; margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--fg); }
    .back-link svg { width: 14px; height: 14px; }

    /* 404 */
    .not-found { padding: 8rem 2.5rem; text-align: center; }
    .not-found h1 { font-size: 4rem; font-weight: 800; margin-bottom: 1rem; }
    .not-found p { color: var(--muted); margin-bottom: 2rem; }

    /* FOOTER */
    footer {
      padding: 3rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; color: var(--muted);
      margin-top: 4rem;
    }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .use-case { grid-template-columns: 1fr; }
      .use-case.image-left { direction: ltr; }
      .about-module { grid-template-columns: 1fr; }
      nav { padding: 0 1.25rem; }
      .hero, .section { padding-left: 1.25rem; padding-right: 1.25rem; }
      .project-detail { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="#/" class="nav-logo">MH</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div id="app">
    <!-- page divs are created dynamically from portfolio.json -->
    <div id="page-project" class="page"></div>
    <div id="page-404" class="page not-found">
      <h1>404</h1>
      <p>Page not found.</p>
      <a href="#/" class="btn">Go Home</a>
    </div>
  </div>

  <footer>
    <span id="footer-name"></span>
    <span id="footer-year"></span>
  </footer>

  <script>
    let DATA = null;

    async function loadData() {
      if (window.location.search.includes('preview=1')) {
        try {
          const preview = localStorage.getItem('portfolio-preview');
          if (preview) return JSON.parse(preview);
        } catch(e) {}
      }
      const res = await fetch('./portfolio.json?v=' + Date.now());
      return res.json();
    }

    function renderNav(data) {
      const container = document.getElementById('nav-links');
      const published = data.navigation.filter(n => n.published);
      container.innerHTML = published.map(n =>
        `<a href="${n.slug}" data-slug="${n.slug}">${n.label}</a>`
      ).join('');
      document.title = data.site.title;
      document.getElementById('footer-name').textContent = data.site.author;
      document.getElementById('footer-year').textContent = new Date().getFullYear();
    }

    function setActive(hash) {
      document.querySelectorAll('.nav-links a').forEach(a => {
        a.classList.toggle('active', a.dataset.slug === hash);
      });
    }

    // ── Module renderers ──────────────────────────────────────────────────────

    function renderModule(m, data) {
      switch (m.type) {
        case 'hero':         return renderHero(m.data);
        case 'project-grid': return renderProjectGrid(m.data, data);
        case 'about':        return renderAbout(m.data);
        case 'text':         return renderText(m.data);
        case 'use-case':     return renderUseCase(m.data);
        case 'image':        return renderImage(m.data);
        case 'project-hero': return renderProjectHero(m.data);
        default: return '';
      }
    }

    function renderHero(d) {
      return `
        <div class="hero">
          <h1>${d.heading}</h1>
          <div class="rich-text" style="font-size:clamp(1rem,2vw,1.2rem);color:var(--muted);max-width:540px;margin-bottom:2.5rem;">${d.subheading}</div>
          <a href="${d.ctaTarget}" class="btn">${d.ctaLabel}</a>
        </div>`;
    }

    function renderProjectGrid(d, data) {
      const projects = d.projects.filter(p => p.status === 'published');
      const cards = projects.map(p => `
        <a class="project-card" href="#/project/${p.id}">
          <img src="${p.image}" alt="${p.title}" loading="lazy">
          <div class="project-card-body">
            <div class="project-card-category">${p.category}</div>
            <div class="project-card-title">${p.title}</div>
          </div>
        </a>`).join('');
      return `
        <div class="section" id="projects">
          <div class="section-heading">${d.heading}</div>
          <div class="project-grid">${cards}</div>
        </div>`;
    }

    function renderAbout(d) {
      return `
        <div class="about-module module">
          <img src="${d.image}" alt="${d.heading}">
          <div class="about-content">
            <h1>${d.heading}</h1>
            <div class="rich-text">${d.body}</div>
          </div>
        </div>`;
    }

    function renderText(d) {
      return `
        <div class="text-module module">
          <div class="module-label">${d.label}</div>
          <h2>${d.heading}</h2>
          <div class="rich-text">${d.body}</div>
        </div>`;
    }

    function renderUseCase(d) {
      const imgLeft = d.imagePosition === 'left' ? 'image-left' : '';
      return `
        <div class="use-case module ${imgLeft}">
          <div class="use-case-content">
            <div class="module-label">${d.label}</div>
            <h2>${d.heading}</h2>
            <div class="rich-text">${d.body}</div>
          </div>
          <img src="${d.image}" alt="${d.label}" loading="lazy">
        </div>`;
    }

    function renderImage(d) {
      return `
        <div class="module">
          <img src="${d.src}" alt="${d.alt || ''}" style="width:100%;border-radius:var(--radius);display:block;">
          ${d.caption ? `<p style="font-size:0.85rem;color:var(--muted);margin-top:0.75rem;">${d.caption}</p>` : ''}
        </div>`;
    }

    function renderProjectHero(d) {
      return `
        <div class="project-meta">
          <span>${d.category}</span>
          <span>${d.year}</span>
        </div>
        <h1>${d.title}</h1>
        <div class="project-hero-img">
          <img src="${d.image}" alt="${d.title}">
        </div>`;
    }

    // ── Page rendering ────────────────────────────────────────────────────────

    function renderPage(page) {
      const el = document.getElementById('page-' + page.id);
      if (!el) return;
      const content = page.modules.map(m => renderModule(m, DATA)).join('');
      // Home page renders full-bleed (modules handle their own layout)
      el.innerHTML = page.slug === '/'
        ? content
        : `<div class="section">${content}</div>`;
    }

    function renderProjectDetail(projectId) {
      const detailPage = DATA.pages.find(p => p.slug === '/project/:id');
      if (!detailPage) return;
      const allProjects = detailPage.projects || [];
      const project = allProjects.find(p => p.id === projectId);
      const el = document.getElementById('page-project');
      if (!project) {
        el.innerHTML = `<div class="not-found"><h1>Project not found</h1><a href="#/" class="btn">Back</a></div>`;
        return;
      }
      const idx = allProjects.indexOf(project);
      const prev = idx > 0 ? allProjects[idx - 1] : null;
      const next = idx < allProjects.length - 1 ? allProjects[idx + 1] : null;
      const modules = project.modules.map(m => renderModule(m, DATA)).join('');
      const prevLink = prev
        ? `<a href="#/project/${prev.id}"><span class="pn-dir">← Previous</span><span class="pn-title">${prev.title}</span></a>`
        : '<span></span>';
      const nextLink = next
        ? `<a href="#/project/${next.id}"><span class="pn-dir">Next →</span><span class="pn-title">${next.title}</span></a>`
        : '<span></span>';
      el.innerHTML = `
        <div class="project-detail">
          <a href="#/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
            </svg>
            All Work
          </a>
          ${modules}
          <div class="project-nav">${prevLink}${nextLink}</div>
        </div>`;
    }

    // ── Routing ───────────────────────────────────────────────────────────────

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
      window.scrollTo(0, 0);
    }

    function route() {
      if (!DATA) return;
      const hash = window.location.hash || '#/';

      // Project detail pages are special — rendered on demand
      if (hash.startsWith('#/project/')) {
        const id = hash.replace('#/project/', '');
        renderProjectDetail(id);
        showPage('page-project');
        setActive('#/');
        return;
      }

      // Convert hash to page slug: '#/about' → '/about', '#/' → '/'
      const slug = hash.replace(/^#/, '') || '/';
      const page = DATA.pages.find(
        p => p.status === 'published' && p.slug === slug && p.slug !== '/project/:id'
      );

      if (page) {
        showPage('page-' + page.id);
        setActive(hash);
      } else {
        showPage('page-404');
      }
    }

    async function init() {
      DATA = await loadData();
      renderNav(DATA);

      // Dynamically create a <div> for every published page and render its modules
      const app = document.getElementById('app');
      const sentinel = document.getElementById('page-project');
      DATA.pages
        .filter(p => p.status === 'published' && p.slug !== '/project/:id')
        .forEach(page => {
          const div = document.createElement('div');
          div.id = 'page-' + page.id;
          div.className = 'page';
          app.insertBefore(div, sentinel);
          renderPage(page);
        });

      window.addEventListener('hashchange', route);
      route();
    }

    init();
  </script>
</body>
</html>
